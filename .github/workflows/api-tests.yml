name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: iitkart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Define shared environment variables for the whole job
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/iitkart_test
      JWT_SECRET: test_jwt_secret_for_ci
      PORT: 5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Database Setup (Prisma)
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Build server
        working-directory: backend
        run: npm run build

      - name: Start Server and Wait
        working-directory: backend
        run: |
          # Start the server in the background
          node dist/server.js &
          
          # Wait for the health check to return 200 OK
          # We use 127.0.0.1 to avoid potential IPv6 resolution issues in CI
          npx wait-on http://127.0.0.1:5000/health --timeout 60000

      - name: Run Newman tests
        working-directory: backend
        run: npm run test:api