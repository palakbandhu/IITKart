name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: iitkart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/iitkart_test
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/iitkart_test
        run: npx prisma migrate deploy

      - name: Start server
        working-directory: backend
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/iitkart_test
          JWT_SECRET: test_jwt_secret_for_ci
          PORT: 5000
        run: npm run dev &

      - name: Wait for server
        run: |
          sleep 10
          npx wait-on http://localhost:5000/health --timeout 60000
          
      - name: Run Newman tests
        working-directory: backend
        run: npm run test:api